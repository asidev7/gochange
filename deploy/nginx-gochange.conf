# Nginx — GoChange (gochange.store)
# Copier vers : /etc/nginx/sites-available/gochange  puis lier dans sites-enabled.
# Config HTTP simple : `certbot --nginx` ajoutera automatiquement le bloc HTTPS (443).

server {
    listen 80;
    listen [::]:80;
    server_name gochange.store www.gochange.store;

    client_max_body_size 12M;   # uploads KYC (pièces d'identité, selfie)

    # Fichiers statiques (collectstatic) et médias (uploads)
    location /static/ {
        alias /var/www/gochange/staticfiles/;
        expires 30d;
        access_log off;
    }
    location /media/ {
        alias /var/www/gochange/media/;
        expires 7d;
    }

    # Application Django via Gunicorn
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
