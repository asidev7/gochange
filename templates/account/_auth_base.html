{% extends "base.html" %}
{# Layout dédié auth : chrome minimal (logo seul), pas de navbar marketing ni de footer complet. #}

{% block navbar %}
<header class="absolute inset-x-0 top-0 z-10">
  <div class="container-x flex h-20 items-center justify-between">
    <a href="{% url 'core:landing' %}" class="flex items-center gap-2.5">
      <span class="logo-badge flex h-9 w-9 items-center justify-center rounded-xl text-white font-extrabold">G</span>
      <span class="text-lg font-extrabold tracking-tight">Go<span class="brand-text">Change</span></span>
    </a>
    <a href="{% url 'core:landing' %}" class="inline-flex items-center gap-1.5 text-sm font-medium text-gray-secondary transition hover:text-ink">
      <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"/></svg>
      Retour au site
    </a>
  </div>
</header>
{% endblock %}

{% block footer %}
<footer class="py-8">
  <div class="container-x flex flex-col items-center justify-between gap-2 text-xs text-gray-secondary sm:flex-row">
    <p>© {% now "Y" %} GoChange</p>
    <div class="flex gap-4">
      <a href="{% url 'core:cgu' %}" class="hover:text-ink">CGU</a>
      <a href="{% url 'core:confidentialite' %}" class="hover:text-ink">Confidentialité</a>
      <a href="{% url 'core:contact' %}" class="hover:text-ink">Aide</a>
    </div>
  </div>
</footer>
{% endblock %}
